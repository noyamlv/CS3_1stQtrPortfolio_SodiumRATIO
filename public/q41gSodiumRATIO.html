<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add / Update a Movie Rating</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    /* Main card container */
    .card {
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      padding: 36px 40px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      text-align: center;
      font-size: 1.45rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 28px;
    }

    /* Form field labels */
    label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      color: #333;
      margin-bottom: 6px;
    }

    /* Text inputs */
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 20px;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    /* Dropdown select */
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 20px;
      background-color: #fff;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }

    select:focus {
      border-color: #2563eb;
    }

    /* Star rating row */
    .star-rating {
      display: flex;
      flex-direction: row;
      justify-content: flex-start;
      margin-bottom: 8px;
      gap: 6px;
    }

    .star-btn {
      cursor: pointer;
      width: 34px;
      height: 34px;
      transition: transform 0.1s ease;
    }

    .star-btn:hover {
      transform: scale(1.15);
    }

    /* Default star = gray */
    .star-btn svg {
      width: 34px;
      height: 34px;
      fill: #ccc;
      transition: fill 0.15s ease;
    }

    /* Hovered star = light yellow */
    .star-btn.hover svg {
      fill: #fde68a;
    }

    /* Selected star = full yellow */
    .star-btn.selected svg {
      fill: #f5a623;
    }

    /* Add Movie button */
    .btn-add {
      width: 100%;
      padding: 12px;
      background-color: #2563eb;
      color: #ffffff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-bottom: 30px;
    }

    .btn-add:hover {
      background-color: #1d4ed8;
    }

    h2 {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 16px;
    }

    /* Movie list item */
    .movie-item {
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 10px;
      font-size: 0.88rem;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .movie-info {
      flex: 1;
      min-width: 0;
    }

    .movie-stars {
      display: flex;
      align-items: center;
      gap: 1px;
      white-space: nowrap;
    }

    /* Delete button */
    .btn-delete {
      background-color: #ef4444;
      color: white;
      border: none;
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      white-space: nowrap;
    }

    .btn-delete:hover {
      background-color: #dc2626;
    }

    /* Empty state */
    .empty-msg {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 12px 0;
    }

    /* Red border on empty input fields */
    input[type="text"].error {
      border-color: #ef4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
      margin-bottom: 4px;
    }

    /* Inline field error messages */
    .error-msg {
      color: #ef4444;
      font-size: 0.78rem;
      font-weight: 500;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Red highlight around stars if none selected */
    #starRating.error {
      background-color: #fff1f1;
      border: 2px solid #ef4444;
      border-radius: 8px;
      padding: 6px 10px;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.2);
    }

    /* Slide-in toast notification */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      color: white;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      box-shadow: 0 6px 24px rgba(0,0,0,0.25);
      z-index: 99999;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Red = validation error */
    .toast.red   { background-color: #ef4444; }
    /* Green = update success */
    .toast.green { background-color: #16a34a; }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- Shared toast for errors and update confirmations -->
  <div class="toast" id="toast"></div>

  <div class="card">
    <h1>Add / Update a Movie Rating</h1>

    <!-- Title -->
    <label for="title">Title:</label>
    <input type="text" id="title" placeholder="Enter movie title" />
    <span class="error-msg" id="titleError" style="display:none;">⚠ Title is required.</span>

    <!-- Year -->
    <label for="year">Year:</label>
    <input type="text" id="year" placeholder="Enter release year" />
    <span class="error-msg" id="yearError" style="display:none;">⚠ Year is required.</span>

    <!-- Genre -->
    <label for="genre">Genre:</label>
    <select id="genre">
      <option value="Action">Action</option>
      <option value="Comedy">Comedy</option>
      <option value="Drama">Drama</option>
      <option value="Horror">Horror</option>
      <option value="Romance">Romance</option>
      <option value="Sci-Fi">Sci-Fi</option>
      <option value="Thriller">Thriller</option>
      <option value="Animation">Animation</option>
    </select>

    <!-- Star Rating (SVG, 1–5) -->
    <label>Rating:</label>
    <div class="star-rating" id="starRating">
      <span class="star-btn" data-value="1" title="1 star">
        <svg viewBox="0 0 51 48" xmlns="http://www.w3.org/2000/svg"><path d="M25.5 4C25.5 4 19.2 16.2 17.5 18C15.8 19.8 3 21.5 3 21.5C3 21.5 12.5 30.5 13.5 32.5C14.5 34.5 12 47 12 47C12 47 25.5 40 25.5 40C25.5 40 39 47 39 47C39 47 36.5 34.5 37.5 32.5C38.5 30.5 48 21.5 48 21.5C48 21.5 35.2 19.8 33.5 18C31.8 16.2 25.5 4 25.5 4Z"/></svg>
      </span>
      <span class="star-btn" data-value="2" title="2 stars">
        <svg viewBox="0 0 51 48" xmlns="http://www.w3.org/2000/svg"><path d="M25.5 4C25.5 4 19.2 16.2 17.5 18C15.8 19.8 3 21.5 3 21.5C3 21.5 12.5 30.5 13.5 32.5C14.5 34.5 12 47 12 47C12 47 25.5 40 25.5 40C25.5 40 39 47 39 47C39 47 36.5 34.5 37.5 32.5C38.5 30.5 48 21.5 48 21.5C48 21.5 35.2 19.8 33.5 18C31.8 16.2 25.5 4 25.5 4Z"/></svg>
      </span>
      <span class="star-btn" data-value="3" title="3 stars">
        <svg viewBox="0 0 51 48" xmlns="http://www.w3.org/2000/svg"><path d="M25.5 4C25.5 4 19.2 16.2 17.5 18C15.8 19.8 3 21.5 3 21.5C3 21.5 12.5 30.5 13.5 32.5C14.5 34.5 12 47 12 47C12 47 25.5 40 25.5 40C25.5 40 39 47 39 47C39 47 36.5 34.5 37.5 32.5C38.5 30.5 48 21.5 48 21.5C48 21.5 35.2 19.8 33.5 18C31.8 16.2 25.5 4 25.5 4Z"/></svg>
      </span>
      <span class="star-btn" data-value="4" title="4 stars">
        <svg viewBox="0 0 51 48" xmlns="http://www.w3.org/2000/svg"><path d="M25.5 4C25.5 4 19.2 16.2 17.5 18C15.8 19.8 3 21.5 3 21.5C3 21.5 12.5 30.5 13.5 32.5C14.5 34.5 12 47 12 47C12 47 25.5 40 25.5 40C25.5 40 39 47 39 47C39 47 36.5 34.5 37.5 32.5C38.5 30.5 48 21.5 48 21.5C48 21.5 35.2 19.8 33.5 18C31.8 16.2 25.5 4 25.5 4Z"/></svg>
      </span>
      <span class="star-btn" data-value="5" title="5 stars">
        <svg viewBox="0 0 51 48" xmlns="http://www.w3.org/2000/svg"><path d="M25.5 4C25.5 4 19.2 16.2 17.5 18C15.8 19.8 3 21.5 3 21.5C3 21.5 12.5 30.5 13.5 32.5C14.5 34.5 12 47 12 47C12 47 25.5 40 25.5 40C25.5 40 39 47 39 47C39 47 36.5 34.5 37.5 32.5C38.5 30.5 48 21.5 48 21.5C48 21.5 35.2 19.8 33.5 18C31.8 16.2 25.5 4 25.5 4Z"/></svg>
      </span>
    </div>
    <!-- Hidden field stores the chosen rating number -->
    <input type="hidden" id="selectedRating" value="" />
    <span class="error-msg" id="ratingError" style="display:none;">⚠ Please select a star rating.</span>

    <button class="btn-add" onclick="addMovie()">Add Movie</button>

    <h2>Movie List</h2>
    <div id="movieList">
      <p class="empty-msg">No movies added yet.</p>
    </div>
  </div>

  <script>
    // On page load: show saved movies and wire up star buttons
    window.onload = function () {
      displayMovies();
      initStars();

      // Clear title error as user types
      document.getElementById('title').addEventListener('input', function () {
        this.classList.remove('error');
        document.getElementById('titleError').style.display = 'none';
      });

      // Clear year error as user types
      document.getElementById('year').addEventListener('input', function () {
        this.classList.remove('error');
        document.getElementById('yearError').style.display = 'none';
      });
    };

    /**
     * Wires up hover and click events on each SVG star button.
     */
    function initStars() {
      const starBtns = document.querySelectorAll('.star-btn');

      starBtns.forEach(function (btn) {
        const val = parseInt(btn.getAttribute('data-value'));

        // Hover: light-yellow up to the hovered star
        btn.addEventListener('mouseenter', function () {
          starBtns.forEach(function (s) {
            const sVal = parseInt(s.getAttribute('data-value'));
            s.classList.toggle('hover', sVal <= val);
            s.classList.remove('selected');
          });
        });

        // Mouse out: restore whatever is currently selected
        btn.addEventListener('mouseleave', function () {
          const current = parseInt(document.getElementById('selectedRating').value) || 0;
          starBtns.forEach(function (s) {
            const sVal = parseInt(s.getAttribute('data-value'));
            s.classList.remove('hover');
            s.classList.toggle('selected', sVal <= current);
          });
        });

        // Click: lock in the rating, clear any star error
        btn.addEventListener('click', function () {
          document.getElementById('selectedRating').value = val;
          starBtns.forEach(function (s) {
            const sVal = parseInt(s.getAttribute('data-value'));
            s.classList.remove('hover');
            s.classList.toggle('selected', sVal <= val);
          });
          document.getElementById('starRating').classList.remove('error');
          document.getElementById('ratingError').style.display = 'none';
        });
      });
    }

    /**
     * Returns the selected rating string, or null if nothing chosen.
     */
    function getSelectedRating() {
      const val = document.getElementById('selectedRating').value;
      return val ? val : null;
    }

    /**
     * Handles the Add Movie button.
     * Validates inputs — red borders + toast on error.
     * If title already exists: UPDATES by averaging old and new rating.
     * If new title: CREATES a fresh movie entry.
     */
    function addMovie() {
      const titleInput = document.getElementById('title');
      const yearInput  = document.getElementById('year');
      const title      = titleInput.value.trim();
      const year       = yearInput.value.trim();
      const genre      = document.getElementById('genre').value;
      const rating     = getSelectedRating();

      // Clear previous errors
      clearErrors();
      let hasError = false;

      if (!title) {
        titleInput.classList.add('error');
        document.getElementById('titleError').style.display = 'flex';
        hasError = true;
      }

      if (!year) {
        yearInput.classList.add('error');
        document.getElementById('yearError').style.display = 'flex';
        hasError = true;
      }

      if (!rating) {
        document.getElementById('starRating').classList.add('error');
        document.getElementById('ratingError').style.display = 'block';
        hasError = true;
      }

      // Block submission and alert user if there are errors
      if (hasError) {
        showToast('⚠️ Please fill in all fields and select a rating!', 'red');
        return;
      }

      // Load existing movies from localStorage
      const existing    = localStorage.getItem('movies');
      const moviesArray = existing ? JSON.parse(existing) : [];

      // Check if this title already exists (case-insensitive) → UPDATE
      const existingIndex = moviesArray.findIndex(function (m) {
        return m.title.toLowerCase() === title.toLowerCase();
      });

      if (existingIndex !== -1) {
        // Average old and new rating for the update
        const oldRating = parseFloat(moviesArray[existingIndex].rating);
        const newRating = parseFloat(rating);
        const avgRating = ((oldRating + newRating) / 2).toFixed(1);

        moviesArray[existingIndex].rating = avgRating;
        moviesArray[existingIndex].year   = year;
        moviesArray[existingIndex].genre  = genre;

        localStorage.setItem('movies', JSON.stringify(moviesArray));
        showToast('✅ "' + title + '" updated! Avg rating: ' + avgRating + ' ⭐', 'green');
      } else {
        // Brand-new movie — push to array
        const newMovie = { title: title, year: year, genre: genre, rating: rating };
        moviesArray.push(newMovie);
        localStorage.setItem('movies', JSON.stringify(moviesArray));
      }

      // Reset form
      titleInput.value = '';
      yearInput.value  = '';
      document.getElementById('genre').selectedIndex    = 0;
      document.getElementById('selectedRating').value   = '';
      document.querySelectorAll('.star-btn').forEach(function (s) {
        s.classList.remove('selected', 'hover');
      });

      displayMovies();
    }

    /**
     * Shows a browser confirm dialog before deleting a movie.
     * Only removes the entry if the user clicks OK.
     */
    function deleteMovie(index) {
      const existing    = localStorage.getItem('movies');
      const moviesArray = existing ? JSON.parse(existing) : [];
      const movieTitle  = moviesArray[index].title;

      // Built-in confirm dialog — matches the exercise screenshot
      const confirmed = confirm('Are you sure you want to delete "' + movieTitle + '"?');
      if (!confirmed) return; // User cancelled — do nothing

      moviesArray.splice(index, 1);
      localStorage.setItem('movies', JSON.stringify(moviesArray));
      displayMovies();
    }

    /**
     * Clears all error states from the form.
     */
    function clearErrors() {
      document.getElementById('title').classList.remove('error');
      document.getElementById('year').classList.remove('error');
      document.getElementById('starRating').classList.remove('error');
      document.getElementById('titleError').style.display  = 'none';
      document.getElementById('yearError').style.display   = 'none';
      document.getElementById('ratingError').style.display = 'none';
    }

    /**
     * Shows the slide-in toast with a message and colour ('red' or 'green').
     * Auto-dismisses after 3 seconds.
     */
    function showToast(message, color) {
      const toast    = document.getElementById('toast');
      toast.textContent = message;
      toast.className   = 'toast ' + color;
      void toast.offsetWidth; // force reflow to restart CSS transition
      toast.classList.add('show');
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(function () {
        toast.classList.remove('show');
      }, 3000);
    }

    /**
     * Reads movies from localStorage and renders the movie list,
     * including a Delete button on each entry.
     */
    function displayMovies() {
      const movieListDiv = document.getElementById('movieList');
      const stored       = localStorage.getItem('movies');
      const moviesArray  = stored ? JSON.parse(stored) : [];

      if (moviesArray.length === 0) {
        movieListDiv.innerHTML = '<p class="empty-msg">No movies added yet.</p>';
        return;
      }

      let html = '';
      moviesArray.forEach(function (movie, index) {
        const stars = generateStars(parseFloat(movie.rating));
        html += `
          <div class="movie-item">
            <span class="movie-info">${movie.title} (${movie.year}) - ${movie.genre}, Rating:</span>
            <span class="movie-stars">${stars}</span>
            <button class="btn-delete" onclick="deleteMovie(${index})">Delete</button>
          </div>
        `;
      });

      movieListDiv.innerHTML = html;
    }

    /**
     * Generates SVG star icons for a given rating.
     * Rounds decimals (e.g. 4.5 → 5) for visual display.
     */
    function generateStars(rating) {
      const path    = 'M25.5 4C25.5 4 19.2 16.2 17.5 18C15.8 19.8 3 21.5 3 21.5C3 21.5 12.5 30.5 13.5 32.5C14.5 34.5 12 47 12 47C12 47 25.5 40 25.5 40C25.5 40 39 47 39 47C39 47 36.5 34.5 37.5 32.5C38.5 30.5 48 21.5 48 21.5C48 21.5 35.2 19.8 33.5 18C31.8 16.2 25.5 4 25.5 4Z';
      const rounded = Math.round(rating);
      let html = '';
      for (let i = 1; i <= 5; i++) {
        const color = i <= rounded ? '#f5a623' : '#ccc';
        html += `<svg width="18" height="18" viewBox="0 0 51 48" xmlns="http://www.w3.org/2000/svg"
                   style="fill:${color};display:inline-block;vertical-align:middle;margin-right:1px">
                   <path d="${path}"/>
                 </svg>`;
      }
      return html;
    }
  </script>

</body>
</html>
